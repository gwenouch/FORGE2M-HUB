<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forge2M Apps</title>
    <meta
      name="description"
      content="Plateforme Forge2M pour acceder aux applications industrielles et gerer les forfaits."
    />
    <script>
      (() => {
        const shellVersion = "20260708-hub12";
        const versionKey = "forge2m-hub-shell-version";
        const reloadKey = "forge2m-hub-shell-reloaded";
        try {
          const previousVersion = localStorage.getItem(versionKey);
          if (previousVersion === shellVersion) {
            return;
          }
          localStorage.setItem(versionKey, shellVersion);
          const tasks = [];
          if ("caches" in window) {
            tasks.push(
              caches
                .keys()
                .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
                .catch(() => {})
            );
          }
          Promise.all(tasks).finally(() => {
            if (sessionStorage.getItem(reloadKey) === shellVersion) {
              return;
            }
            sessionStorage.setItem(reloadKey, shellVersion);
            const url = new URL(location.href);
            url.searchParams.set("v", shellVersion);
            location.replace(url.toString());
          });
        } catch (error) {
          // Continue booting if storage is unavailable.
        }
      })();
    </script>
    <link rel="stylesheet" href="/src/styles.css?v=20260708-hub9" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <div class="boot-screen">
        <div class="brand-mark">F2M</div>
        <p>Chargement Forge2M Apps...</p>
      </div>
    </div>
    <script type="module" src="/src/app.js?v=20260708-hub9"></script>
  </body>
</html>
